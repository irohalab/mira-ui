<div class="staff-header">制作人员</div>
<div class="staff-info">
  @for (job of jobs; track job) {
    <div class="staff-item">
      <span class="job">{{job}}：</span>
      @for (staff of staffMap[job]; track staff; let isLast = $last) {
        <span class="staff-name">
          <a [href]="staff.url" class="staff-link" target="_blank">{{staff.name}}</a>
          @if (!isLast) {
            <span class="staff-name-divider">/</span>
          }
        </span>
      }
    </div>
  }
</div>
